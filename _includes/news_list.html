{% assign news_limit = include.limit | default: site.data.news.size %}
<ul>
{% for item in site.data.news limit: news_limit %}
  <li><strong>{{ item.date }}</strong> - {{ item.content | markdownify | remove: '<p>' | remove: '</p>' | strip }}</li>
{% endfor %}
</ul>
{% if include.limit %}
<p><a href="/news/">See all news →</a></p>
{% endif %}
